<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Order Page</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: #f2f4f7;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 360px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .header img {
      width: 100px;
    }

    .products {
      padding: 10px 20px;
    }

    .product {
      background: #fafafa;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.05);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .product h3 {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .product p {
      font-size: 13px;
      color: #555;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .footer {
      padding: 20px;
      border-top: 1px solid #eee;
    }

    .footer p {
      font-size: 13px;
      margin-bottom: 5px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #007bff;
      color: white;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 250px;
    }

    .modal-content h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .close-btn {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: #28a745;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <img src="flip.PNG" alt="Logo"><br><img src="yt.png" alt="Logo">
      <h4> ಉಚಿತ ಒಳಉಡುಪುಗಳನ್ನು ಖರೀದಿಸಿ </h4>
    </div>

    <div class="products">

      <div class="product">
        <img src="f.png" alt="Product 1">
        <select>
          <option>Select Size</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
        </select>
      </div>

      <div class="product">
        <img src="m.png" alt="Product 2">
       
        <select>
          <option>Select Size</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
        </select>
      </div>

    </div>

    <div class="footer">
      <p><strong>Address:</strong> <input type="text"></p>
      <p><strong>Contact 1:</strong> <input type="text"></p>
      <p><strong>Contact 2:</strong> <input type="text"></p>

      <button class="btn" onclick="openModal()">Buy Now</button>
    </div>

  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Order Confirmed!</h2>
      <p>ನಿಮ್ಮ ಆರ್ಡರ್ ಸ್ವೀಕರಿಸಲಾಗಿದೆ. ಏಪ್ರಿಲ್ 30 ರಂದು ಡೆಲಿವರಿ ಮಾಡಲಾಗುವುದು.</p>
      <button class="close-btn" onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }
  </script>

</body>
</html>
